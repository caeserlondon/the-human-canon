name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Debug environment
        run: |
          echo "PWD:"
          pwd
          echo "FILES:"
          ls -la
          echo "NODE:"
          node -v
          echo "NPM:"
          npm -v
          echo "LOCKFILES:"
          find . -maxdepth 2 \( -name "package-lock.json" -o -name "npm-shrinkwrap.json" \)
          echo "PICOMATCH IN LOCKFILE:"
          grep -n "picomatch" package-lock.json || true

      - name: Install dependencies
        run: npm ci
